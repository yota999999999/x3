<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Tebak 3 Kartu</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#000;
    color:white;
    text-align:center;
}

#gameWrapper{
    position:relative;
    width:300px;
    height:200px;
    margin:120px auto;
    display:flex;
    align-items:center;
    justify-content:center;
}

#bgVideo{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:20px;
    opacity:0.7;
    z-index:0;
}

#game{
    position:relative;
    z-index:1;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

/* BULAT */
.card{
    width:45px;
    height:45px;
    border-radius:50%;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(8px);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    cursor:pointer;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.1);
    transition:0.3s;
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

/* HURUF */
.label{
    position:absolute;
    top:1px;
    left:50%;
    transform:translateX(-50%);
    font-size:10px;
    font-weight:bold;
    color:#fff;
    text-shadow:0 0 6px rgba(0,0,0,0.8);
    pointer-events:none;
}

/* ✨ BLING */
.card.open.reguler{
    box-shadow:0 0 10px rgba(0,255,100,0.7),
               0 0 20px rgba(0,255,100,0.4);
}

.card.open.sultan{
    box-shadow:0 0 10px rgba(255,0,0,0.7),
               0 0 20px rgba(255,0,0,0.4);
}

.card.open.crazy{
    box-shadow:0 0 10px rgba(255,215,0,0.9),
               0 0 20px rgba(255,215,0,0.5);
}

.card.open.nt{
    box-shadow:0 0 6px rgba(120,120,120,0.5);
}

/* 🔥 ANIMASI ACAK */
@keyframes shuffle{
    0%{ transform:translate(0,0) rotate(0deg); }
    25%{ transform:translate(-5px,5px) rotate(-10deg); }
    50%{ transform:translate(5px,-5px) rotate(10deg); }
    75%{ transform:translate(-3px,3px) rotate(-6deg); }
    100%{ transform:translate(0,0) rotate(0deg); }
}

.shuffle{
    animation:shuffle 0.4s ease;
}

button{
    margin:3px;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    font-weight:bold;
}

.active{
    background:gold;
    color:black;
}
</style>
</head>

<body>

<div>
<button onclick="toggleGame()" id="toggleBtn">ON</button>
<button onclick="acak()">🔀 Riset</button>
<button onclick="bukaSemua()">🎁 Buka Semua</button><br>

<button onclick="setMode('reguler')" id="regulerBtn" class="active">Reguler</button>
<button onclick="setMode('sultan')" id="sultanBtn">Sultan</button>
<button onclick="setMode('crazy')" id="crazyBtn">Crazy</button>
</div>

<div id="gameWrapper">
<video id="bgVideo" autoplay loop muted>
<source src="hd.mp4" type="video/mp4">
</video>

<div id="game"></div>
</div>

<audio id="winSound" src="jp.mp3"></audio>
<audio id="loseSound" src="mitos1.mp3"></audio>

<script>
let gameOn=true;
let pilihan=[];
let mode="reguler";

const game=document.getElementById("game");
const huruf=["A","B","C","D","E","F"];

// buat kartu
for(let i=0;i<6;i++){
    let c=document.createElement("div");
    c.className="card";

    let label=document.createElement("div");
    label.className="label";
    label.innerText=huruf[i];

    c.appendChild(label);
    c.onclick=()=>pilihKartu(c);

    game.appendChild(c);
}

// isi kartu
function generateIsi(){
    let hadiah=mode;
    return [hadiah,hadiah,hadiah,"nt","nt","nt"]
    .sort(()=>Math.random()-0.5);
}

let isiKartu=generateIsi();

// klik kartu
function pilihKartu(card){
    if(!gameOn || card.classList.contains("open")) return;

    let index=[...game.children].indexOf(card);
    let isiAsli=isiKartu[index];
    let isi=isiAsli;

    // anti 3 kembar hanya 3 pertama
    if(pilihan.length === 2){
        if(pilihan[0] === pilihan[1] && pilihan[0] === isiAsli){

            let indexAlt = isiKartu.findIndex((v,i)=>{
                return !game.children[i].classList.contains("open") && v !== isiAsli;
            });

            if(indexAlt !== -1){
                isi = isiKartu[indexAlt];
                isiKartu[indexAlt] = isiAsli;
                isiKartu[index] = isi;
            }
        }
    }

    let label = card.querySelector(".label");
    if(label) label.remove();

    let img=document.createElement("img");

    if(isi=="reguler") img.src="reguler1.png";
    if(isi=="sultan") img.src="sultan.png";
    if(isi=="crazy") img.src="crazy.png";

    if(isi=="nt"){
        if(mode=="reguler") img.src="nt.png";
        if(mode=="sultan") img.src="nt1.png";
        if(mode=="crazy") img.src="nt2.png";
    }

    card.appendChild(img);
    card.classList.add("open", isi);

    if(pilihan.length < 3){
        pilihan.push(isi);
    }

    let win=document.getElementById("winSound");
    let lose=document.getElementById("loseSound");

    win.pause(); lose.pause();
    win.currentTime=0;
    lose.currentTime=0;

    if(isi=="nt") lose.play();
    else win.play();
}

// 🔥 ACAK DENGAN ANIMASI
function acak(){
    if(!gameOn) return;

    let cards=[...game.children];

    cards.forEach((c,i)=>{
        setTimeout(()=>{
            c.classList.add("shuffle");

            setTimeout(()=>{
                c.className="card";
                c.innerHTML='<div class="label">'+huruf[i]+'</div>';
            },400);

        }, i*70);
    });

    pilihan=[];

    setTimeout(()=>{
        isiKartu=generateIsi();
    },500);
}

// buka semua
function bukaSemua(){
    if(!gameOn) return;

    [...game.children].forEach((c,i)=>{
        if(!c.classList.contains("open")){
            setTimeout(()=>pilihKartu(c), i*120);
        }
    });
}

// mode
function setMode(m){
    mode=m;

    document.getElementById("regulerBtn").classList.remove("active");
    document.getElementById("sultanBtn").classList.remove("active");
    document.getElementById("crazyBtn").classList.remove("active");

    document.getElementById(m+"Btn").classList.add("active");

    acak();
}

// on off
function toggleGame(){
    gameOn=!gameOn;
    document.getElementById("toggleBtn").innerText=gameOn?"ON":"OFF";
}
</script>

</body>
</html>
