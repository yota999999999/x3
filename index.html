<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Game Tebak 3 Kartu</title>

<style>
body{
    margin:0;
    font-family:sans-serif;
    background:#000;
    color:white;
    text-align:center;
}

#gameWrapper{
    position:relative;
    width:300px;
    height:200px;
    margin:120px auto;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* 🔥 TEKS MODE */
#modeText{
    position:absolute;
    top:-30px;
    width:100%;
    text-align:center;
    font-weight:bold;
    font-size:18px;
    text-shadow:0 0 8px rgba(0,0,0,0.8);
    z-index:2;
}

#bgVideo{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:90vw;
    max-width:1000px;
    aspect-ratio:16/9;
    height:auto;
    object-fit:contain;
    border-radius:20px;
    opacity:0.7;
    z-index:0;
}

#game{
    position:relative;
    z-index:1;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:10px;
}

.card{
    width:100px;
    height:100px;
    border-radius:50%;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(8px);
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    cursor:pointer;
    overflow:hidden;
    border:1px solid rgba(255,255,255,0.1);
}

.card img{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

.label{
    position:absolute;
    top:4px;
    left:50%;
    transform:translateX(-50%);
    font-size:14px;
    font-weight:bold;
    color:#fff;
}

/* glow */
.card.open.reguler{ box-shadow:0 0 15px #00ff00; }
.card.open.sultan{ box-shadow:0 0 15px red; }
.card.open.crazy{ box-shadow:0 0 15px gold; }
.card.open.nt{ box-shadow:0 0 6px gray; }

/* ✨ ANIMASI */
@keyframes hilang{
    0%{ opacity:1; transform:scale(1);}
    100%{ opacity:0; transform:scale(0.5);}
}

@keyframes muncul{
    0%{ opacity:0; transform:scale(0.5);}
    100%{ opacity:1; transform:scale(1);}
}

.hilang{ animation:hilang 0.25s forwards; }
.muncul{ animation:muncul 0.25s forwards; }

button{
    margin:3px;
    padding:6px 10px;
    border:none;
    border-radius:6px;
    font-weight:bold;
}

.active{
    background:gold;
    color:black;
}
</style>
</head>

<body>

<div>
<button onclick="toggleGame()" id="toggleBtn">ON</button>
<button onclick="acak()">🔀 Riset</button>
<button onclick="bukaSemua()">🎁 Buka Semua</button><br>

<button onclick="setMode('reguler')" id="regulerBtn" class="active">Reguler</button>
<button onclick="setMode('sultan')" id="sultanBtn">Sultan</button>
<button onclick="setMode('crazy')" id="crazyBtn">Crazy</button>
</div>

<div id="gameWrapper">

<div id="modeText">Reguler</div>

<video id="bgVideo" autoplay loop muted>
<source src="hd.mp4" type="video/mp4">
</video>

<div id="game"></div>
</div>

<audio id="winSound" src="jp.mp3"></audio>
<audio id="loseSound" src="mitos1.mp3"></audio>

<script>
let gameOn=true;
let pilihan=[];
let mode="reguler";

const game=document.getElementById("game");
const huruf=["A","B","C","D","E","F","G","H","I"];

/* 9 kartu */
for(let i=0;i<9;i++){
    let c=document.createElement("div");
    c.className="card";

    let label=document.createElement("div");
    label.className="label";
    label.innerText=huruf[i];

    c.appendChild(label);
    c.onclick=()=>pilihKartu(c);

    game.appendChild(c);
}

/* isi */
function generateIsi(){
    let utama=mode;
    let kedua=mode+"2";

    return [
        utama,utama,utama,
        kedua,kedua,kedua,
        "nt","nt","nt"
    ].sort(()=>Math.random()-0.5);
}

let isiKartu=generateIsi();

function pilihKartu(card){
    if(!gameOn || card.classList.contains("open")) return;

    let index=[...game.children].indexOf(card);
    let isi=isiKartu[index];

    if(pilihan.length === 2){
        if(pilihan[0]===mode && pilihan[1]===mode && isi===mode){

            let indexAlt = isiKartu.findIndex((v,i)=>{
                return !game.children[i].classList.contains("open") && v !== mode;
            });

            if(indexAlt !== -1){
                isiKartu[index]=isiKartu[indexAlt];
                isiKartu[indexAlt]=mode;
                isi=isiKartu[index];
            }
        }
    }

    let label = card.querySelector(".label");
    if(label) label.remove();

    let img=document.createElement("img");

    if(isi=="reguler") img.src="reguler1.png";
    if(isi=="reguler2") img.src="reguler2.png";

    if(isi=="sultan") img.src="sultan.png";
    if(isi=="sultan2") img.src="sultan2.png";

    if(isi=="crazy") img.src="crazy.png";
    if(isi=="crazy2") img.src="crazy2.png";

    if(isi=="nt"){
        if(mode=="reguler") img.src="nt.png";
        if(mode=="sultan") img.src="nt1.png";
        if(mode=="crazy") img.src="nt2.png";
    }

    card.appendChild(img);
    card.classList.add("open", isi);

    if(pilihan.length < 3){
        pilihan.push(isi);
    }

    let win=document.getElementById("winSound");
    let lose=document.getElementById("loseSound");

    win.pause(); lose.pause();
    win.currentTime=0;
    lose.currentTime=0;

    if(isi.includes("2") || isi=="nt") lose.play();
    else win.play();
}

/* 🔥 Riset dengan efek */
function acak(){
    if(!gameOn) return;

    let cards=[...game.children];

    cards.forEach((c,i)=>{
        setTimeout(()=>{
            c.classList.add("hilang");

            setTimeout(()=>{
                c.className="card";
                c.innerHTML='<div class="label">'+huruf[i]+'</div>';

                c.classList.add("muncul");

                setTimeout(()=>{
                    c.classList.remove("muncul");
                },250);

            },250);

        }, i*70);
    });

    pilihan=[];

    setTimeout(()=>{
        isiKartu=generateIsi();
    },400);
}

function bukaSemua(){
    if(!gameOn) return;

    [...game.children].forEach((c,i)=>{
        if(!c.classList.contains("open")){
            setTimeout(()=>pilihKartu(c), i*100);
        }
    });
}

function setMode(m){
    mode=m;

    document.getElementById("regulerBtn").classList.remove("active");
    document.getElementById("sultanBtn").classList.remove("active");
    document.getElementById("crazyBtn").classList.remove("active");

    document.getElementById(m+"Btn").classList.add("active");

    /* 🔥 TEXT MODE */
    let text=document.getElementById("modeText");

    if(m==="reguler") text.innerText="Reguler";
    if(m==="sultan") text.innerText="Sultan";
    if(m==="crazy") text.innerText="SULTAAAANNN";

    acak();
}

function toggleGame(){
    gameOn=!gameOn;
    document.getElementById("toggleBtn").innerText=gameOn?"ON":"OFF";
}
</script>

</body>
</html>
